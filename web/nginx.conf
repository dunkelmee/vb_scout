server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so nginx re-resolves container hostnames
    # at request time instead of caching the IP from startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must never be cached so the browser always gets the latest version.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    location /api {
        # Store the upstream in a variable — this forces nginx to use the
        # resolver directive above rather than resolving at config-load time.
        set $upstream http://api:3005;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Allow up to 8 MB uploads (photos, etc.) — must be ≥ API's multer limit
        client_max_body_size 8m;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /uploads {
        set $upstream http://api:3005;
        proxy_pass $upstream;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
