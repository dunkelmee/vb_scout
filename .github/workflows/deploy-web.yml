name: Deploy Web

on:
  push:
    branches: [main]

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        run: |
          SEMVER=$(node -p "require('./web/package.json').version")
          BUILD=$(printf "%03d" ${{ github.run_number }})
          echo "string=${SEMVER}.${BUILD}" >> $GITHUB_OUTPUT

      - name: Set VITE_APP_VERSION on Railway
        env:
          APP_VERSION: ${{ steps.version.outputs.string }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_WEB_SERVICE_ID }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          curl -fsSL -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg pid "$PROJECT_ID" \
              --arg sid "$SERVICE_ID" \
              --arg eid "$ENV_ID" \
              --arg ver "$APP_VERSION" \
              '{
                query: "mutation($i: VariableUpsertInput!) { variableUpsert(input: $i) }",
                variables: { i: { projectId: $pid, serviceId: $sid, environmentId: $eid, name: "VITE_APP_VERSION", value: $ver } }
              }')"

      - name: Trigger Railway web deploy
        run: curl -fsSL -X POST "${{ secrets.RAILWAY_WEB_DEPLOY_HOOK }}"

      - name: Summary
        run: |
          echo "### Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.string }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** [\`${GITHUB_SHA::7}\`]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" >> $GITHUB_STEP_SUMMARY
